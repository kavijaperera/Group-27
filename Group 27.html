<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Profile Card">
    <title>Student Profile Card</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .profile-container:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
            text-align: center;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid white;
            margin: 0 auto 15px;
            background: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: #999;
            overflow: hidden;
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-body {
            padding: 30px 20px;
        }

        .student-name {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }

        .student-stream {
            font-size: 16px;
            color: #667eea;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            margin: 20px 0;
        }

        .bio-section {
            margin-bottom: 25px;
        }

        .bio-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .bio-text {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            text-align: justify;
        }

        .contact-section {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        .contact-button {
            flex: 1;
            padding: 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .contact-button:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 480px) {
            .profile-container {
                max-width: 100%;
            }

            .student-name {
                font-size: 24px;
            }

            .profile-image {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Profile Header Section -->
        <div class="profile-header">
            <div class="profile-image">
                <img src="https://via.placeholder.com/120?text=Profile" alt="Student Profile Picture">
                <!-- Replace src with actual image path -->
            </div>
            <h1 class="student-name">John Doe</h1>
            <p class="student-stream">Computer Science</p>
        </div>

        <!-- Profile Body Section -->
        <div class="profile-body">
            <div class="divider"></div>

            <!-- Bio Section -->
            <div class="bio-section">
                <p class="bio-label">About Me</p>
                <p class="bio-text">
                    A passionate student with a keen interest in web development and software engineering. 
                    Dedicated to learning new technologies and collaborating with peers on innovative projects. 
                    Always eager to contribute to meaningful work and grow as a developer.
                </p>
            </div>

            <!-- Contact Section -->
            <div class="contact-section">
                <button class="contact-button">Email</button>
                <button class="contact-button">Message</button>
            </div>
        </div>
    </div>
</body>
</html>
